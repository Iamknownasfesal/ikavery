pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc,css}"
      run: bun x biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: typecheck
      run: bun run typecheck
    - name: cargo-fmt
      glob: "solana/packages/program/**/*.rs"
      run: cargo fmt --manifest-path solana/packages/program/Cargo.toml --all -- --check
    - name: cargo-clippy
      glob: "solana/packages/program/**/*.rs"
      run: cargo clippy --manifest-path solana/packages/program/Cargo.toml --all-targets -- -D warnings
