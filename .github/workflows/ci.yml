name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.10
  SUI_VERSION: testnet-v1.55.0

jobs:
  ts:
    name: TypeScript (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          CI: "true"
          LEFTHOOK: "0"

      - name: Lint (biome)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  move:
    name: Move (build · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Sui CLI
        id: sui-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sui-cli
          key: sui-cli-${{ env.SUI_VERSION }}-ubuntu-x86_64

      - name: Install Sui CLI
        run: |
          set -euo pipefail
          if [ ! -x "$HOME/.cache/sui-cli/sui" ]; then
            mkdir -p "$HOME/.cache/sui-cli" .sui-bin
            curl -fsSL "https://github.com/MystenLabs/sui/releases/download/${SUI_VERSION}/sui-${SUI_VERSION}-ubuntu-x86_64.tgz" \
              | tar -xz -C .sui-bin
            SUI_BIN="$(find .sui-bin -name sui -type f -perm -u+x | head -n1)"
            test -n "$SUI_BIN" || { echo "sui binary not found in tarball"; exit 1; }
            install -m 0755 "$SUI_BIN" "$HOME/.cache/sui-cli/sui"
          fi
          sudo install -m 0755 "$HOME/.cache/sui-cli/sui" /usr/local/bin/sui
          sui --version

      - name: Move build
        run: sui move build --path sui/packages/contracts/recovery

      - name: Move test
        run: sui move test --path sui/packages/contracts/recovery

  rust:
    name: Rust (fmt · clippy · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solana/packages/program
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup show active-toolchain || rustup toolchain install stable --profile minimal
          rustup component add rustfmt clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: solana/packages/program -> target

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Unit tests
        run: cargo test --lib --locked
